framework:
    workflows:
        inquiry:
            type: 'state_machine'
            audit_trail:
                enabled: true
            marking_store:
                type: 'method'
                property: 'status'
            supports:
                - App\Entity\Inquiry
            initial_marking: draft
            places:
                - draft
                - pending_approval
                - submitted
                - in_review
                - more_info
                - information_provided
                - in_progress
                - completed
                - accepted
                - canceled
            transitions:
                submit:
                    from: draft
                    to: submitted
                submit_for_approval:
                    from: draft
                    to: pending_approval
                approve:
                    from: pending_approval
                    to: submitted
                review:
                    from: submitted
                    to: in_review
                request_more_info:
                    from: [submitted, in_review, information_provided]
                    to: more_info
                provide_information:
                    from: more_info
                    to: information_provided
                start_progress:
                    from: [submitted, in_review, information_provided]
                    to: in_progress
                complete:
                    from: in_progress
                    to: completed
                accept:
                    from: completed
                    to: accepted
                cancel:
                    from: [draft, pending_approval, submitted, in_review, more_info, information_provided, in_progress]
                    to: canceled

        order:
            type: 'state_machine'
            audit_trail:
                enabled: true
            marking_store:
                type: 'method'
                property: 'status'
            supports:
                - App\Entity\Order
            initial_marking: draft
            places:
                - draft
                - pending_approval
                - submitted
                - confirmed
                - dispatched
                - completed
                - canceled
            transitions:
                submit:
                    from: draft
                    to: submitted
                submit_for_approval:
                    from: draft
                    to: pending_approval
                approve:
                    from: pending_approval
                    to: submitted
                confirm:
                    from: submitted
                    to: confirmed
                dispatch:
                    from: confirmed
                    to: dispatched
                complete:
                    from: dispatched
                    to: completed
                cancel:
                    from: [draft, pending_approval, submitted, confirmed]
                    to: canceled
